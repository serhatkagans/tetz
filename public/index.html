<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="TETZ2026 - Öğrencileri ilgi alanlarına göre akıllıca eşleştiren networking platformu" />
  <title>TETZ2026 — Öğrenci Networking Platformu</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="app">
    <nav class="navbar" aria-label="Ana navigasyon">
      <a href="#" class="navbar__logo">TETZ2026</a>
      <ul class="navbar__links">
        <li><a href="#hero">Ana Sayfa</a></li>
        <li><a href="#stats-bar">İstatistikler</a></li>
        <li><a href="#map-container">Harita</a></li>
        <li><a href="#content-area">Öğrenciler</a></li>
      </ul>
    </nav>

    <section id="hero" class="hero">
      <div class="hero__content">
        <p class="hero__eyebrow">Öğrenci Networking Platformu</p>
        <h1 class="hero__title">İlgi alanlarına göre akıllı eşleştirme</h1>
        <p class="hero__description">
          TETZ2026 ile okulundaki öğrencileri keşfet, ortak ilgi alanlarına göre buluş
          ve yeni bağlantılar kur.
        </p>
      </div>
    </section>

    <section id="stats-bar" class="stats-section" aria-label="Platform istatistikleri"></section>

    <main class="main-content">
      <div id="map-container"></div>
      <div id="content-area"></div>
    </main>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import {
      getFirestore,
      collection,
      doc,
      getDoc,
      getDocs,
      setDoc,
      addDoc,
      updateDoc,
      query,
      where,
      onSnapshot,
      serverTimestamp
    } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
    import {
      getAuth,
      signInAnonymously,
      onAuthStateChanged
    } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

    const firebaseConfig = {
    apiKey: "AIzaSyCWt9CdhaqQlH16XOyPLYDS_0I3KAYee24",
authDomain: "tetz-3a211.firebaseapp.com",
projectId: "tetz-3a211",
storageBucket: "tetz-3a211.firebasestorage.app",
messagingSenderId: "605910979481",
appId: "1:605910979481:web:f6db8c68978ad91d977908"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);

    window.tetz = {
      app,
      db,
      auth,
      firestore: {
        collection, doc, getDoc, getDocs, setDoc, addDoc, updateDoc,
        query, where, onSnapshot, serverTimestamp
      },
      authApi: { signInAnonymously, onAuthStateChanged }
    };
  </script>

  <script type="module" src="app.js"></script>
</body>
</html>
